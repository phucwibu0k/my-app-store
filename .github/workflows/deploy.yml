name: Auto Build App Store

# 1. SỬA LỖI TRIGGER: Kích hoạt khi có Release mới được Publish
on:
  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Khởi tạo Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 2. SỬA LỖI THIẾU IPA: Tự động tải file IPA từ Release mới nhất về thư mục apps/
      - name: Tải file IPA từ GitHub Release (Latest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apps
          curl -sH "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | grep "browser_download_url.*ipa" \
            | cut -d : -f 2,3 \
            | tr -d \" \
            | wget -qi - -P apps/

      - name: Chạy Script xử lý IPA
        run: python build.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload dữ liệu
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy lên GitHub Pages
        uses: actions/deploy-pages@v2
