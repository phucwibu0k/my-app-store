<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="App Store - Tải các ứng dụng mới nhất">
    <title>App Store</title>
    
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
        padding: 30px 0;
    }
    header h1 { font-size: 2.5em; margin-bottom: 10px; }
    header p  { font-size: 1.1em; opacity: 0.9; }

    .apps-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .app-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .app-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .app-icon-wrapper { text-align: center; margin-bottom: 15px; }
    .app-icon {
        width: 80px; height: 80px;
        border-radius: 18px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex; align-items: center; justify-content: center;
        font-size: 2.5em;
        margin: 0 auto;
    }

    .app-name  { font-size: 1.1em; font-weight: 600; color: #1c1c1e; margin-bottom: 5px; text-align: center; }
    .app-info  { font-size: 0.85em; color: #8e8e93; text-align: center; margin-bottom: 10px; }

    .category-badge {
        display: inline-block;
        background: #667eea; color: white;
        padding: 4px 12px; border-radius: 20px;
        font-size: 0.75em; margin-bottom: 10px;
    }

    .filter-tabs {
        display: flex; justify-content: center;
        gap: 10px; margin-bottom: 30px; flex-wrap: wrap;
    }
    .filter-btn {
        padding: 8px 18px;
        border: 2px solid white; background: transparent; color: white;
        border-radius: 25px; cursor: pointer;
        font-size: 0.95em; font-weight: 500;
        transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active { background: white; color: #667eea; }

    .stats { text-align: center; color: white; margin-bottom: 20px; font-size: 0.9em; }

    @media (max-width: 768px) {
        header h1 { font-size: 1.8em; }
        .apps-grid { grid-template-columns: 1fr; }
    }
</style>

</head>
<body>
<div class="container">
    <header>
        <h1>📱 App Store</h1>
        <p>Khám phá các ứng dụng tuyệt vời</p>
    </header>

    <div class="stats">Có 3 ứng dụng • 2 danh mục</div>

    <div class="filter-tabs">
        <button class="filter-btn active" onclick="filterCategory('ALL')">Tất cả</button>
<button class="filter-btn" onclick="filterCategory('APP')">APP</button>
<button class="filter-btn" onclick="filterCategory('GAME')">GAME</button>

    </div>

    <div class="apps-grid" id="appsContainer">
        <div class="app-card" data-category="GAME" onclick="window.location.href='app.html?tag=freefire'">
    <div class="app-icon-wrapper"><img src="icons/freefire.png" alt="FF•pH Mod" class="app-icon" style="object-fit:cover;"></div>
    <span class="category-badge">GAME</span>
    <h3 class="app-name">FF•pH Mod</h3>
    <div class="app-info">v1.123.1 • 12/04/2026</div>
</div>
<div class="app-card" data-category="GAME" onclick="window.location.href='app.html?tag=lien_quan'">
    <div class="app-icon-wrapper"><img src="icons/lien_quan.png" alt="LQ•pH Mod" class="app-icon" style="object-fit:cover;"></div>
    <span class="category-badge">GAME</span>
    <h3 class="app-name">LQ•pH Mod</h3>
    <div class="app-info">v1.62.11625414 • 09/04/2026</div>
</div>
<div class="app-card" data-category="APP" onclick="window.location.href='app.html?tag=bawa'">
    <div class="app-icon-wrapper"><img src="icons/bawa.png" alt="Bawa" class="app-icon" style="object-fit:cover;"></div>
    <span class="category-badge">APP</span>
    <h3 class="app-name">Bawa</h3>
    <div class="app-info">v1.1 • 09/04/2026</div>
</div>

    </div>
</div>

<script>
    function filterCategory(category) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.app-card').forEach(card => {
            card.style.display = (category === 'ALL' || card.dataset.category === category)
                ? 'block' : 'none';
        });
    }
</script>

</body>
</html>
